<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strombecker Designer v2.0.17</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; overflow: hidden; touch-action: none; }
        canvas { background: #222; display: block; cursor: grab; }
        .toolbar { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; border-top: 2px solid #444; z-index: 10; }
        .info-panel { position: absolute; top: 10px; right: 10px; pointer-events: none; }
        
        /* Increased by 15%: 18px -> 20.7px */
        .main-title { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 20.7px; font-weight: bold; letter-spacing: 1px; color: #eee; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; z-index: 5; }
        
        button { padding: 12px 2px; font-size: 11px; font-weight: bold; cursor: pointer; background: #444; color: white; border: 1px solid #666; border-radius: 6px; }
        button:hover { background: #555; }
        .x-btn { background: #4a2e4a; border-color: #ff00ff; color: #ff00ff; }
        
        .stats-container { position: absolute; top: 45px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; }
        
        .inventory { display: flex; gap: 10px; pointer-events: auto; }
        /* Increased by 15%: 12px -> 13.8px */
        .inv-item { background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 4px; border: 1px solid #555; font-size: 13.8px; text-align: center; }
        /* Increased by 15%: 9px -> 10.35px */
        .inv-label { display: block; font-size: 10.35px; color: #aaa; text-transform: uppercase; }
        
        /* Increased by 15%: 14px -> 16.1px */
        .table-size { background: rgba(255,255,255,0.05); color: #ccc; padding: 4px 12px; border-radius: 4px; font-size: 16.1px; border: 1px solid #444; font-weight: bold; pointer-events: auto; }
        
        /* Increased by 15%: 12px -> 13.8px */
        .badge { background: rgba(0,0,0,0.85); padding: 8px 15px; border-radius: 8px; border: 1px solid #444; color: #fff; font-size: 13.8px; line-height: 1.4; pointer-events: auto; text-align: center; }
        .l1-text { color: #ff4444; font-weight: bold; }
        .l2-text { color: #44aaff; font-weight: bold; }
        
        .danger { background: #633; }
    </style>
</head>
<body>
    <div class="main-title">1/32 Scale Strombecker Track</div>

    <div class="info-panel">
        <div style="color:rgba(255,255,255,0.3); font-size:10px; font-weight: bold;">v2.0.17</div>
    </div>

    <div class="stats-container">
        <div class="inventory" id="inventory">
            <div class="inv-item"><span class="inv-label">Straight</span><span id="count-S">0</span></div>
            <div class="inv-item"><span class="inv-label">Curves</span><span id="count-C">0</span></div>
            <div class="inv-item"><span class="inv-label">Crossover</span><span id="count-X">0</span></div>
        </div>

        <div class="table-size" id="tableDimensions">Table: 0' x 0'</div>

        <div class="badge" id="stats">
            Lane 1 (Red): <span class="l1-text">0.0 ft</span> | 
            Lane 2 (Blue): <span class="l2-text">0.0 ft</span>
        </div>
    </div>

    <canvas id="trackCanvas"></canvas>
    
    <div class="toolbar">
        <button onmouseenter="setGhost('S')" onmouseleave="setGhost(null)" onclick="addPiece('S')">STRAIGHT (S)</button>
        <button onmouseenter="setGhost('L')" onmouseleave="setGhost(null)" onclick="addPiece('L')">LEFT (L)</button>
        <button onmouseenter="setGhost('R')" onmouseleave="setGhost(null)" onclick="addPiece('R')">RIGHT (R)</button>
        <button class="x-btn" onmouseenter="setGhost('X')" onmouseleave="setGhost(null)" onclick="addPiece('X')">CROSSOVER (X)</button>
        <button class="danger" onclick="undo()">UNDO LAST</button>
        <button style="background:#4a4a2e" onclick="syncTrack()">IMPORT/EXPORT</button>
        <button style="background:#2e4a4a" onclick="centerTrack()">CENTER</button>
        <button class="danger" onclick="reset()">RESET ALL</button>
    </div>

    <script>
        const canvas = document.getElementById('trackCanvas');
        const ctx = canvas.getContext('2d');
        // Fundamental Geometry
        const REAL_STRAIGHT = 12.125, OUTSIDE_DIAMETER = 28.0, TRACK_WIDTH = 7.0; 
        const SLOT_SPACING = 3.5, PPI = 15;
        const CENTER_RADIUS = (OUTSIDE_DIAMETER / 2) - (TRACK_WIDTH / 2); 

        let track = JSON.parse(localStorage.getItem('strom_v2013')) || [];
        let ghostPiece = null;
        let scale = 0.4, offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let isDragging = false, lastPos = { x: 0, y: 0 };
        let initialDist = null;

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; draw(); };
        window.onresize();

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(offset.x, offset.y); ctx.scale(scale, scale);

            let curX = 0, curY = 0, curAngle = 0;
            let l1Dist = 0, l2Dist = 0;
            let carRedSlot = 0; 
            let bounds = { minX: 0, minY: 0, maxX: 0, maxY: 0 };
            let counts = { S: 0, C: 0, X: 0 };

            track.forEach((type, index) => {
                let res = renderPiece(type, curX, curY, curAngle, false, index % 2 === 0, index === 0, carRedSlot);
                
                if (type === 'S') counts.S++;
                else if (type === 'X') counts.X++;
                else counts.C++;

                if (carRedSlot === 0) {
                    l1Dist += res.distLeft;
                    l2Dist += res.distRight;
                } else {
                    l1Dist += res.distRight;
                    l2Dist += res.distLeft;
                }

                if (type === 'X') carRedSlot = 1 - carRedSlot;
                
                curX = res.x; curY = res.y; curAngle = res.angle;
                bounds.minX = Math.min(bounds.minX, curX); bounds.maxX = Math.max(bounds.maxX, curX);
                bounds.minY = Math.min(bounds.minY, curY); bounds.maxY = Math.max(bounds.maxY, curY);
            });

            if (ghostPiece) renderPiece(ghostPiece, curX, curY, curAngle, true, false, false, carRedSlot);
            ctx.restore();

            document.getElementById('stats').innerHTML = `Lane 1 (Red): <span class="l1-text">${(l1Dist/12).toFixed(2)} ft</span> | Lane 2 (Blue): <span class="l2-text">${(l2Dist/12).toFixed(2)} ft</span>`;
            document.getElementById('count-S').innerText = counts.S;
            document.getElementById('count-C').innerText = counts.C;
            document.getElementById('count-X').innerText = counts.X;

            const wIn = (bounds.maxX-bounds.minX)/PPI, hIn = (bounds.maxY-bounds.minY)/PPI;
            document.getElementById('tableDimensions').innerText = `Table: ${Math.floor(wIn/12)}' ${Math.round(wIn%12)}" x ${Math.floor(hIn/12)}' ${Math.round(hIn%12)}"`;
            localStorage.setItem('strom_v2013', JSON.stringify(track));
        }

        function renderPiece(type, x, y, angle, isGhost, altColor, isHome, carRedSlot) {
            ctx.save();
            const slotOff = (SLOT_SPACING / 2) * PPI;
            const rad = angle * Math.PI / 180;
            ctx.lineCap = "butt";
            
            if (isGhost) { 
                ctx.strokeStyle = "rgba(255,255,255,0.1)"; 
                ctx.setLineDash([10,10]); 
            } else { 
                ctx.strokeStyle = isHome ? "#4682B4" : (type === 'X' ? "#222" : (altColor ? "#333" : "#3d3d3d")); 
            }
            ctx.lineWidth = TRACK_WIDTH * PPI;

            let nX, nY, nAngle = angle, distLeft, distRight;

            if (type === 'S' || type === 'X') {
                let d = REAL_STRAIGHT * PPI;
                nX = x + Math.cos(rad) * d; nY = y + Math.sin(rad) * d;
                ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(nX, nY); ctx.stroke();
                
                distLeft = distRight = (type === 'S') ? REAL_STRAIGHT : Math.sqrt(Math.pow(REAL_STRAIGHT, 2) + Math.pow(SLOT_SPACING, 2));

                if (!isGhost) {
                    ctx.setLineDash([]); ctx.lineWidth = 2.5;
                    let p1 = rad - Math.PI/2, p2 = rad + Math.PI/2;
                    let cLeft = (carRedSlot === 0) ? "#ff4444" : "#44aaff";
                    let cRight = (carRedSlot === 1) ? "#ff4444" : "#44aaff";

                    if (type === 'S') {
                        ctx.strokeStyle = cLeft; ctx.beginPath(); ctx.moveTo(x+Math.cos(p1)*slotOff, y+Math.sin(p1)*slotOff); ctx.lineTo(nX+Math.cos(p1)*slotOff, nY+Math.sin(p1)*slotOff); ctx.stroke();
                        ctx.strokeStyle = cRight; ctx.beginPath(); ctx.moveTo(x+Math.cos(p2)*slotOff, y+Math.sin(p2)*slotOff); ctx.lineTo(nX+Math.cos(p2)*slotOff, nY+Math.sin(p2)*slotOff); ctx.stroke();
                    } else {
                        ctx.strokeStyle = cLeft; ctx.beginPath(); ctx.moveTo(x+Math.cos(p1)*slotOff, y+Math.sin(p1)*slotOff); ctx.lineTo(nX+Math.cos(p2)*slotOff, nY+Math.sin(p2)*slotOff); ctx.stroke();
                        ctx.strokeStyle = cRight; ctx.beginPath(); ctx.moveTo(x+Math.cos(p2)*slotOff, y+Math.sin(p2)*slotOff); ctx.lineTo(nX+Math.cos(p1)*slotOff, nY+Math.sin(p1)*slotOff); ctx.stroke();
                    }
                }
            } else {
                let dir = (type === 'R') ? 1 : -1;
                let rP = CENTER_RADIUS * PPI;
                let cX = x + Math.cos((angle+90*dir)*Math.PI/180)*rP, cY = y + Math.sin((angle+90*dir)*Math.PI/180)*rP;
                let sA = (angle-90*dir)*Math.PI/180, eA = sA + (60 * dir * Math.PI/180);
                
                ctx.beginPath(); ctx.arc(cX, cY, rP, sA, eA, dir === -1); ctx.stroke();
                nAngle = angle + (60 * dir);
                nX = cX + Math.cos((nAngle-90*dir)*Math.PI/180)*rP; nY = cY + Math.sin((nAngle-90*dir)*Math.PI/180)*rP;
                
                let dIn = (60/360)*2*Math.PI*(CENTER_RADIUS - (SLOT_SPACING/2));
                let dOut = (60/360)*2*Math.PI*(CENTER_RADIUS + (SLOT_SPACING/2));
                
                if (type === 'L') { distLeft = dIn; distRight = dOut; }
                else { distLeft = dOut; distRight = dIn; }

                if (!isGhost) {
                    ctx.setLineDash([]); ctx.lineWidth = 2.5;
                    ctx.strokeStyle = (carRedSlot === 0) ? "#ff4444" : "#44aaff";
                    ctx.beginPath(); ctx.arc(cX, cY, rP + (type === 'L' ? -slotOff : slotOff), sA, eA, dir === -1); ctx.stroke();
                    ctx.strokeStyle = (carRedSlot === 1) ? "#ff4444" : "#44aaff";
                    ctx.beginPath(); ctx.arc(cX, cY, rP + (type === 'L' ? slotOff : -slotOff), sA, eA, dir === -1); ctx.stroke();
                }
            }
            ctx.restore();
            return { x: nX, y: nY, angle: nAngle, distLeft, distRight };
        }

        function setGhost(t) { ghostPiece = t; draw(); }
        function addPiece(t) { track.push(t); draw(); }
        function undo() { track.pop(); draw(); }
        function reset() { if(confirm("Clear layout?")) { track = []; draw(); } }
        function centerTrack() { scale = 0.4; offset = { x: window.innerWidth/2, y: window.innerHeight/2 }; draw(); }
        function syncTrack() {
            const input = prompt("Import/Export Track string (S, L, R, X):", track.join(''));
            if (input !== null) { track = input.toUpperCase().replace(/[^SLRX]/g, '').split(''); draw(); }
        }

        // Improved Touch Interaction for Mobile
        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            if (e.touches.length === 2) {
                initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            } else {
                lastPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            if (e.touches.length === 2 && initialDist !== null) {
                const currentDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                const zoomFactor = currentDist / initialDist;
                scale *= zoomFactor;
                initialDist = currentDist;
                draw();
            } else if (e.touches.length === 1) {
                offset.x += e.touches[0].clientX - lastPos.x;
                offset.y += e.touches[0].clientY - lastPos.y;
                lastPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                draw();
            }
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('touchend', () => { isDragging = false; initialDist = null; });

        // Mouse Handlers
        canvas.onmousedown = (e) => { isDragging = true; lastPos = { x: e.clientX, y: e.clientY }; };
        window.onmousemove = (e) => { if (isDragging) { offset.x += e.clientX-lastPos.x; offset.y += e.clientY-lastPos.y; lastPos = { x: e.clientX, y: e.clientY }; draw(); } };
        window.onmouseup = () => isDragging = false;
        canvas.onwheel = (e) => { e.preventDefault(); scale *= (e.deltaY < 0 ? 1.1 : 0.9); draw(); };
        
        draw();
    </script>
</body>
</html>
