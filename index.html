<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strombecker Precision Designer</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; overflow: hidden; touch-action: none; }
        canvas { background: #222; display: block; }
        .toolbar { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; border-top: 2px solid #444; }
        .info-panel { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; pointer-events: none; }
        button { padding: 12px 2px; font-size: 11px; font-weight: bold; cursor: pointer; background: #444; color: white; border: 1px solid #666; border-radius: 6px; }
        button:active { background: #666; transform: scale(0.95); }
        .special { background: #2e4a4a; }
        .danger { background: #633; }
        .badge { background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 20px; border: 1px solid #00ffcc; color: #00ffcc; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="info-panel">
        <div class="badge" id="inventory">Pieces: 0</div>
        <div class="badge" id="trackLength">0.0 ft</div>
    </div>
    <canvas id="trackCanvas"></canvas>
    <div class="toolbar">
        <button onclick="addPiece('S')">STRAIGHT (S)</button>
        <button onclick="addPiece('L')">LEFT (L)</button>
        <button onclick="addPiece('R')">RIGHT (R)</button>
        <button class="danger" onclick="undo()">UNDO</button>
        <button onclick="exportTrack()">EXPORT</button>
        <button onclick="importTrack()">IMPORT</button>
        <button class="special" onclick="centerTrack()">CENTER</button>
        <button class="danger" onclick="reset()">RESET</button>
    </div>

    <script>
        const canvas = document.getElementById('trackCanvas');
        const ctx = canvas.getContext('2d');
        
        // PHYSICAL CONSTANTS (In "Inches" for the math)
        const REAL_STRAIGHT = 12.125; 
        const OUTSIDE_DIAMETER = 28.0;
        const TRACK_WIDTH = 7.0; 
        const CENTER_RADIUS = (OUTSIDE_DIAMETER / 2) - (TRACK_WIDTH / 2); // 10.5 inches
        
        // VISUAL SCALE (Pixels per inch)
        const PPI = 15; 

        let track = JSON.parse(localStorage.getItem('strom_v3')) || [];
        let scale = 0.4;
        let offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let isDragging = false, lastPos = { x: 0, y: 0 }, initialHypot = 0;

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; draw(); };
        window.onresize();

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(offset.x, offset.y);
            ctx.scale(scale, scale);

            let curX = 0, curY = 0, curAngle = 0, totalInches = 0;
            
            // Start Marker
            ctx.fillStyle = "#ff4444";
            ctx.beginPath(); ctx.arc(0,0, 10, 0, Math.PI*2); ctx.fill();

            track.forEach((type, index) => {
                ctx.strokeStyle = index % 2 === 0 ? "#333" : "#3d3d3d";
                ctx.lineWidth = TRACK_WIDTH * PPI;
                ctx.lineCap = "butt";

                if (type === 'S') {
                    let moveDist = REAL_STRAIGHT * PPI;
                    let nX = curX + Math.cos(curAngle * Math.PI/180) * moveDist;
                    let nY = curY + Math.sin(curAngle * Math.PI/180) * moveDist;
                    ctx.beginPath(); ctx.moveTo(curX, curY); ctx.lineTo(nX, nY); ctx.stroke();
                    drawSeam(nX, nY, curAngle);
                    curX = nX; curY = nY;
                    totalInches += REAL_STRAIGHT;
                } else {
                    let dir = type === 'R' ? 1 : -1;
                    let radPixels = CENTER_RADIUS * PPI;
                    let cX = curX + Math.cos((curAngle + 90 * dir) * Math.PI/180) * radPixels;
                    let cY = curY + Math.sin((curAngle + 90 * dir) * Math.PI/180) * radPixels;
                    let sA = (curAngle - 90 * dir) * Math.PI/180;
                    let eA = sA + (60 * dir * Math.PI/180);
                    
                    ctx.beginPath(); ctx.arc(cX, cY, radPixels, sA, eA, dir === -1); ctx.stroke();
                    
                    curAngle += (60 * dir);
                    curX = cX + Math.cos((curAngle - 90 * dir) * Math.PI/180) * radPixels;
                    curY = cY + Math.sin((curAngle - 90 * dir) * Math.PI/180) * radPixels;
                    drawSeam(curX, curY, curAngle);
                    
                    // Arc length = (angle/360) * 2 * PI * R
                    totalInches += (60 / 360) * 2 * Math.PI * CENTER_RADIUS;
                }
            });

            ctx.restore();
            document.getElementById('inventory').innerText = `Pieces: ${track.length}`;
            document.getElementById('trackLength').innerText = `${(totalInches/12).toFixed(1)} ft`;
            localStorage.setItem('strom_v3', JSON.stringify(track));
        }

        function drawSeam(x, y, angle) {
            ctx.save();
            ctx.strokeStyle = "#888"; ctx.lineWidth = 2;
            ctx.beginPath();
            let perpAngle = (angle + 90) * Math.PI/180;
            let halfW = (TRACK_WIDTH * PPI) / 2;
            ctx.moveTo(x + Math.cos(perpAngle) * halfW, y + Math.sin(perpAngle) * halfW);
            ctx.lineTo(x - Math.cos(perpAngle) * halfW, y - Math.sin(perpAngle) * halfW);
            ctx.stroke();
            ctx.restore();
        }

        function exportTrack() { prompt("Your Track String:", track.join('')); }
        function importTrack() {
            const input = prompt("Paste your track string:");
            if (input) { track = input.toUpperCase().replace(/[^SLR]/g, '').split(''); draw(); }
        }

        // Controls
        canvas.onmousedown = (e) => { isDragging = true; lastPos = { x: e.clientX, y: e.clientY }; };
        window.onmousemove = (e) => { if (isDragging) { offset.x += e.clientX - lastPos.x; offset.y += e.clientY - lastPos.y; lastPos = { x: e.clientX, y: e.clientY }; draw(); } };
        window.onmouseup = () => isDragging = false;
        canvas.onwheel = (e) => { e.preventDefault(); scale *= (e.deltaY < 0 ? 1.1 : 0.9); draw(); };
        canvas.addEventListener('touchstart', (e) => { isDragging = true; if (e.touches.length === 1) { lastPos = { x: e.touches[0].clientX, y: e.touches[0].clientY }; } else if (e.touches.length === 2) { initialHypot = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); } }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (e.touches.length === 1 && isDragging) { offset.x += e.touches[0].clientX - lastPos.x; offset.y += e.touches[0].clientY - lastPos.y; lastPos = { x: e.touches[0].clientX, y: e.touches[0].clientY }; } else if (e.touches.length === 2) { let currentHypot = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); scale *= (currentHypot / initialHypot); initialHypot = currentHypot; } draw(); }, {passive: false});
        canvas.addEventListener('touchend', () => isDragging = false);

        function addPiece(t) { track.push(t); draw(); }
        function undo() { track.pop(); draw(); }
        function reset() { if(confirm("Clear layout?")) { track = []; draw(); } }
        function centerTrack() { scale = 0.4; offset = { x: window.innerWidth/2, y: window.innerHeight/2 }; draw(); }
        draw();
    </script>
</body>
</html>
